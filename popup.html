<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="ui.css" />
    <style>
      html,
      body {
        width: 320px;
        min-height: 0;
      }
      .zt-card {
        border-radius: var(--zt-radius);
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="zt-card">
      <header class="zt-header">
        <img class="zt-app-icon" src="icons/icon48.png" width="40" height="40" alt="" />
        <h1 class="zt-title">Zalo Translator</h1>
        <button type="button" class="zt-icon-btn" id="gear" title="Settings" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"
              stroke="currentColor"
              stroke-width="1.75"
            />
            <path
              d="M19.4 15a1 1 0 0 0 .2 1.1l.05.06a1 1 0 0 1-1.4 1.4l-.06-.05a1 1 0 0 0-1.1-.2 7.4 7.4 0 0 1-1.3.75 1 1 0 0 0-.55.9v.15a1 1 0 0 1-2 0v-.08a1 1 0 0 0-.58-.92 7.4 7.4 0 0 1-1.25-.72 1 1 0 0 0-1.1.2l-.06.05a1 1 0 0 1-1.4-1.4l.05-.06a1 1 0 0 0 .2-1.1 7.4 7.4 0 0 1-.75-1.3 1 1 0 0 0-.9-.55h-.15a1 1 0 0 1 0-2h.08a1 1 0 0 0 .92-.58 7.4 7.4 0 0 1 .72-1.25 1 1 0 0 0-.2-1.1l-.05-.06a1 1 0 1 1 1.4-1.4l.06.05a1 1 0 0 0 1.1.2 7.4 7.4 0 0 1 1.3-.75 1 1 0 0 0 .55-.9V4a1 1 0 0 1 2 0v.08a1 1 0 0 0 .58.92 7.4 7.4 0 0 1 1.25.72 1 1 0 0 0 1.1-.2l.06-.05a1 1 0 1 1 1.4 1.4l-.05.06a1 1 0 0 0-.2 1.1 7.4 7.4 0 0 1 .75 1.3 1 1 0 0 0 .9.55h.15a1 1 0 0 1 0 2h-.08a1 1 0 0 0-.92.58 7.4 7.4 0 0 1-.72 1.25Z"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </header>

      <hr class="zt-divider" />

      <section class="zt-body">
        <label class="zt-check-row" for="enabled">
          <input type="checkbox" id="enabled" />
          <span class="zt-check-box" aria-hidden="true">
            <svg viewBox="0 0 14 14" fill="none">
              <path
                d="M2.5 7.2 5.8 10.5 11.5 3.5"
                stroke="#fff"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          Auto-translate to Vietnamese
        </label>

        <a href="#" class="zt-settings-link" id="opts">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <circle cx="8" cy="6" r="2.5" fill="currentColor" />
            <path d="M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <circle cx="14" cy="12" r="2.5" fill="currentColor" />
            <path d="M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <circle cx="10" cy="18" r="2.5" fill="currentColor" />
          </svg>
          Settings
        </a>
      </section>

      <hr class="zt-divider" />

      <footer class="zt-footer">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z"
          />
          <path
            fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z"
          />
          <path
            fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84Z"
          />
          <path
            fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z"
          />
        </svg>
        Google Translate
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
