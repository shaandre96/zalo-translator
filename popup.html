<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        padding: 12px 14px;
        width: 220px;
        margin: 0;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 13px;
      }
      input[type="checkbox"] {
        transform: scale(1.15);
      }
      a {
        color: #0068ff;
        font-size: 12px;
        text-decoration: none;
        cursor: pointer;
      }
      a:hover {
        text-decoration: underline;
      }
      .muted {
        color: #666;
        font-size: 11px;
      }
      .ok {
        color: #0a8a3a;
      }
      .warn {
        color: #c0392b;
      }
    </style>
  </head>
  <body>
    <h1>Zalo Translator</h1>
    <div class="row">
      <label for="enabled">Auto-translate Vietnamese</label>
      <input type="checkbox" id="enabled" />
    </div>
    <div class="row">
      <a id="opts">⚙ Settings</a>
      <span class="muted">Google Translate</span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
